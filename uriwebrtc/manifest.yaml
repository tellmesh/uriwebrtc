id: uriwebrtc
version: 1
scheme: webrtc
description: WebRTC session — HTTP signaling inbox (node) and DataChannel URI envelopes; browser P2P via ifURI /api/webrtc/signal.
uri_patterns:
  - pattern: webrtc://local/session/{session}/command/start
    kind: command
    operation: webrtc.session.start
    side_effects: true
    approval: required
  - pattern: webrtc://local/session/{session}/data/command/send
    kind: command
    operation: webrtc.data.send
    side_effects: true
    approval: required
  - pattern: webrtc://local/session/{session}/signal/command/post
    kind: command
    operation: webrtc.signal.post
    side_effects: true
    approval: required
  - pattern: webrtc://local/session/{session}/signal/query/inbox
    kind: query
    operation: webrtc.signal.inbox
    side_effects: false
    approval: not_required
handlers:
  python:
    webrtc.session.start: python://uriwebrtc.handlers:session_start
    webrtc.data.send: python://uriwebrtc.handlers:data_send
    webrtc.signal.post: python://uriwebrtc.handlers:signal_post
    webrtc.signal.inbox: python://uriwebrtc.handlers:signal_inbox
